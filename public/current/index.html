<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>All Classes - My PW</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; }
    .chapter-item:hover { background-color: #f8fafc; }
    .active-chapter { background-color: #f0f9ff; border-left: 4px solid #3b82f6; }
    .lecture-card { transition: all 0.3s ease; }
    .lecture-card:hover { transform: translateY(-3px); box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1); }
  </style>
</head>
<body class="bg-gray-50">

<div class="flex h-screen">
  <!-- Sidebar -->
  <div class="w-72 bg-white border-r border-gray-200 overflow-y-auto" id="sidebar"></div>
  
  <!-- Main Content -->
  <div class="flex-1 flex flex-col overflow-hidden">
    <div class="bg-white border-b px-8 py-5 flex justify-between items-center">
      <h1 class="text-2xl font-semibold" id="subject-title">All Classes</h1>
      <button onclick="showManageModal()" 
              class="flex items-center gap-2 bg-blue-600 text-white px-6 py-3 rounded-2xl font-medium">
        <i class="fa-solid fa-plus"></i> Manage
      </button>
    </div>

    <!-- Search + Filters -->
    <div class="bg-white border-b px-8 py-4 flex gap-4 items-center">
      <div class="relative flex-1">
        <input type="text" id="search-input" placeholder="Search lectures by title..." 
               onkeyup="applyFilters()" 
               class="w-full border border-gray-300 rounded-2xl px-5 py-3 pl-12 focus:outline-none focus:border-blue-500">
        <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
      </div>
      <select id="filter-select" onchange="applyFilters()" 
              class="border border-gray-300 rounded-2xl px-5 py-3 focus:outline-none">
        <option value="all">All Lectures</option>
        <option value="completed">Completed</option>
        <option value="pending">Not Completed</option>
      </select>
    </div>

    <div class="flex-1 overflow-y-auto p-8" id="main-content"></div>
  </div>
</div>

<!-- Manage Modal -->
<div id="manage-modal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center z-50">
  <div class="bg-white rounded-3xl p-8 w-full max-w-lg mx-4">
    <h2 class="text-2xl font-semibold mb-6">Manage Content</h2>
    
    <div class="grid grid-cols-2 gap-4 mb-8">
      <button onclick="setManageMode(1)" id="btn1" class="manage-btn py-4 border-2 border-blue-600 text-blue-600 rounded-2xl font-medium manage-btn-active">Add Chapter</button>
      <button onclick="setManageMode(2)" id="btn2" class="manage-btn py-4 border border-gray-300 rounded-2xl font-medium">Add Lecture</button>
      <button onclick="setManageMode(3)" id="btn3" class="manage-btn py-4 border border-gray-300 rounded-2xl font-medium">Delete Chapter</button>
      <button onclick="setManageMode(4)" id="btn4" class="manage-btn py-4 border border-gray-300 rounded-2xl font-medium">Delete Lecture</button>
    </div>

    <div id="form1">
      <input id="chapter-title" type="text" placeholder="New Chapter Title" class="w-full border border-gray-300 rounded-2xl px-5 py-4 text-lg">
    </div>

    <div id="form2" class="hidden space-y-4">
      <select id="lecture-chapter-select" class="w-full border border-gray-300 rounded-2xl px-5 py-4"></select>
      <input id="lecture-title" type="text" placeholder="Lecture Title" class="w-full border border-gray-300 rounded-2xl px-5 py-4">
      <div class="grid grid-cols-2 gap-4">
        <input id="lecture-date" type="date" class="w-full border border-gray-300 rounded-2xl px-5 py-4">
        <input id="lecture-duration" type="text" placeholder="Duration (e.g. 52m)" value="45m" class="w-full border border-gray-300 rounded-2xl px-5 py-4">
      </div>
      <input id="lecture-youtube" type="text" placeholder="YouTube Video ID" class="w-full border border-gray-300 rounded-2xl px-5 py-4">
      <input id="lecture-image" type="text" placeholder="Instructor Image URL (optional)" class="w-full border border-gray-300 rounded-2xl px-5 py-4">
    </div>

    <div id="form3" class="hidden">
      <select id="delete-chapter-select" class="w-full border border-gray-300 rounded-2xl px-5 py-4"></select>
    </div>

    <div id="form4" class="hidden">
      <select id="delete-lecture-chapter" onchange="updateDeleteLectureOptions()" class="w-full border border-gray-300 rounded-2xl px-5 py-4 mb-4"></select>
      <select id="delete-lecture-select" class="w-full border border-gray-300 rounded-2xl px-5 py-4"></select>
    </div>

    <div class="flex gap-4 mt-8">
      <button onclick="hideManageModal()" class="flex-1 py-4 border border-gray-300 rounded-2xl font-medium">Cancel</button>
      <button onclick="executeManageAction()" class="flex-1 py-4 bg-blue-600 text-white rounded-2xl font-semibold">Confirm Action</button>
    </div>
  </div>
</div>

<!-- Admin Login Modal -->
<div id="loginModal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center z-[100]">
  <div class="bg-white rounded-3xl p-8 w-full max-w-sm mx-4">
    <h3 class="text-xl font-semibold mb-4">Admin Login</h3>
    <p class="text-gray-600 mb-6">Default Password: <strong>admin123</strong></p>
    <input type="password" id="adminPass" placeholder="Enter password" class="w-full border border-gray-300 rounded-2xl px-5 py-4 mb-6">
    <div class="flex gap-3">
      <button onclick="hideLoginModal()" class="flex-1 py-4 border border-gray-300 rounded-2xl font-medium">Cancel</button>
      <button onclick="adminLogin()" class="flex-1 py-4 bg-blue-600 text-white rounded-2xl font-semibold">Login</button>
    </div>
  </div>
</div>

<script>
// ============== CONFIGURATION ==============
const urlParams = new URLSearchParams(window.location.search);
const subjectId = "current";   // ← CHANGE THIS for each subject
const subjectName = urlParams.get('subjectName') || 'Current Affairs';

document.getElementById('subject-title').textContent = subjectName;

let currentChapterId = null;
let manageMode = 1;
let token = null;
let isAdmin = false;
let allLectures = [];

// ============== LOAD DATA ==============
async function loadData() {
  try {
    const chaptersRes = await fetch(`/api/chapters?subjectId=${subjectId}`);
    const chapters = await chaptersRes.json();

    let lectures = [];
    if (currentChapterId) {
      const lecturesRes = await fetch(`/api/lectures?chapterId=${currentChapterId}`);
      lectures = await lecturesRes.json();
    } else if (chapters.length > 0) {
      currentChapterId = chapters[0]._id;
      const lecturesRes = await fetch(`/api/lectures?chapterId=${currentChapterId}`);
      lectures = await lecturesRes.json();
    }

    allLectures = lectures;
    renderSidebar(chapters);
    renderLectures(lectures);
  } catch (err) {
    console.error(err);
    document.getElementById('main-content').innerHTML = `<p class="text-center text-red-500 py-20">Failed to load data</p>`;
  }
}

function renderSidebar(chapters) {
  const sidebar = document.getElementById('sidebar');
  let html = `
    <div class="p-6">
      <a href="/subjects.html" class="flex items-center gap-2 text-xl font-semibold text-gray-800">← Subjects</a>
    </div>
    <div class="px-6 py-4 text-xs font-medium text-gray-500">CHAPTERS</div>
    <div class="px-3 space-y-0.5">`;

  chapters.forEach(ch => {
    const active = ch._id === currentChapterId ? 'active-chapter' : 'chapter-item';
    html += `<div class="${active} px-4 py-3 text-sm cursor-pointer hover:bg-gray-100" onclick="selectChapter('${ch._id}')">${ch.title}</div>`;
  });
  html += `</div>`;
  sidebar.innerHTML = html;
}

function renderLectures(lectures) {
  const container = document.getElementById('main-content');
  let html = '';

  if (lectures.length === 0) {
    container.innerHTML = `<p class="text-center text-gray-500 py-20">No lectures found.</p>`;
    return;
  }

  lectures.forEach(lec => {
    const imageUrl = lec.imageUrl || "https://via.placeholder.com/80x80/1f2937/ffffff?text=Instructor";
    const isCompleted = lec.completed === true;

    html += `
      <div class="lecture-card bg-white rounded-3xl p-5 flex gap-4 border border-gray-100 mb-5">
        <img src="${imageUrl}" class="w-16 h-16 rounded-2xl object-cover flex-shrink-0">
        <div class="flex-1">
          <div class="flex justify-between items-start">
            <div>
              <span class="text-xs text-gray-500">${lec.date || 'N/A'} • ${lec.duration || '45m'}</span>
              <h3 class="font-semibold text-base mt-1 line-clamp-2">${lec.title}</h3>
            </div>
            <button onclick="markLectureComplete('${lec._id}')" 
                    class="w-9 h-9 flex items-center justify-center rounded-full border-2 flex-shrink-0
                           ${isCompleted ? 'bg-green-500 border-green-500 text-white' : 'border-gray-300 hover:border-green-500 hover:bg-green-50'}">
              ${isCompleted ? '<i class="fa-solid fa-check"></i>' : '<i class="fa-solid fa-check text-gray-400"></i>'}
            </button>
          </div>

          <!-- Smaller Horizontal Buttons -->
          <div class="flex gap-3 mt-5">
            <button onclick="playVideo('${lec.youtubeId || ''}')" 
                    class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white py-2.5 rounded-2xl text-sm font-medium flex items-center justify-center gap-2">
              <i class="fa-solid fa-play"></i> Watch
            </button>
            <button onclick="alert('Notes feature coming soon')" 
                    class="flex-1 border border-gray-300 hover:bg-gray-50 py-2.5 rounded-2xl text-sm font-medium">
              Notes & more
            </button>
          </div>
        </div>
      </div>`;
  });

  container.innerHTML = html;
}

// Working Search + Filter
function applyFilters() {
  const searchTerm = document.getElementById('search-input').value.toLowerCase().trim();
  const filterType = document.getElementById('filter-select').value;

  let filtered = allLectures.filter(lec => {
    const matchesSearch = !searchTerm || lec.title.toLowerCase().includes(searchTerm);
    let matchesFilter = true;
    if (filterType === 'completed') matchesFilter = lec.completed === true;
    if (filterType === 'pending') matchesFilter = lec.completed !== true;
    return matchesSearch && matchesFilter;
  });

  renderLectures(filtered);
}

function playVideo(videoId) {
  if (!videoId) return alert("No YouTube video ID added yet.");
  window.open(`https://www.youtube.com/embed/${videoId}?autoplay=1&rel=0`, '_blank');
}

async function markLectureComplete(lectureId) {
  if (!token) {
    alert("Please login as Admin first.");
    return;
  }
  try {
    await fetch(`/api/lectures/${lectureId}/complete`, {
      method: 'PATCH',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${token}`
      }
    });
    loadData();
  } catch (err) {
    alert("Server error");
  }
}

function selectChapter(chapterId) {
  currentChapterId = chapterId;
  document.getElementById('search-input').value = '';
  document.getElementById('filter-select').value = 'all';
  loadData();
}

// ============== MANAGE MODAL ==============
function showManageModal() {
  if (!isAdmin) {
    document.getElementById('loginModal').classList.remove('hidden');
    return;
  }
  manageMode = 1;
  document.getElementById('manage-modal').classList.remove('hidden');
  updateManageUI();
}

function hideManageModal() {
  document.getElementById('manage-modal').classList.add('hidden');
}

function hideLoginModal() {
  document.getElementById('loginModal').classList.add('hidden');
}

async function adminLogin() {
  const password = document.getElementById('adminPass').value.trim();
  if (!password) return alert("Please enter password");

  try {
    const res = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password })
    });
    const data = await res.json();

    if (data.success) {
      token = data.token;
      isAdmin = true;
      hideLoginModal();
      alert('✅ Admin Login Successful!');
      showManageModal();
    } else {
      alert('❌ Wrong Password');
    }
  } catch (e) {
    alert('Cannot connect to server.');
  }
}

function setManageMode(mode) {
  manageMode = mode;
  updateManageUI();
}

function updateManageUI() {
  for (let i = 1; i <= 4; i++) {
    const btn = document.getElementById(`btn${i}`);
    if (btn) btn.classList.remove('manage-btn-active');
  }
  document.getElementById(`btn${manageMode}`).classList.add('manage-btn-active');

  for (let i = 1; i <= 4; i++) {
    const form = document.getElementById(`form${i}`);
    if (form) form.classList.toggle('hidden', i !== manageMode);
  }

  if (manageMode === 2) populateLectureChapterSelect();
  if (manageMode === 3) populateDeleteChapterSelect();
  if (manageMode === 4) populateDeleteLectureChapterSelect();
}

async function populateLectureChapterSelect() {
  const select = document.getElementById('lecture-chapter-select');
  select.innerHTML = '<option value="">Select Chapter</option>';
  try {
    const res = await fetch(`/api/chapters?subjectId=${subjectId}`);
    const chapters = await res.json();
    chapters.forEach(ch => {
      const opt = document.createElement('option');
      opt.value = ch._id;
      opt.textContent = ch.title;
      select.appendChild(opt);
    });
  } catch (e) {}
}

async function populateDeleteChapterSelect() {
  const select = document.getElementById('delete-chapter-select');
  select.innerHTML = '<option value="">Select Chapter to Delete</option>';
  try {
    const res = await fetch(`/api/chapters?subjectId=${subjectId}`);
    const chapters = await res.json();
    chapters.forEach(ch => {
      const opt = document.createElement('option');
      opt.value = ch._id;
      opt.textContent = ch.title;
      select.appendChild(opt);
    });
  } catch (e) {}
}

async function populateDeleteLectureChapterSelect() {
  const select = document.getElementById('delete-lecture-chapter');
  select.innerHTML = '<option value="">Select Chapter</option>';
  try {
    const res = await fetch(`/api/chapters?subjectId=${subjectId}`);
    const chapters = await res.json();
    chapters.forEach(ch => {
      const opt = document.createElement('option');
      opt.value = ch._id;
      opt.textContent = ch.title;
      select.appendChild(opt);
    });
  } catch (e) {}
}

async function updateDeleteLectureOptions() {
  const chapterId = document.getElementById('delete-lecture-chapter').value;
  const select = document.getElementById('delete-lecture-select');
  select.innerHTML = '<option value="">Select Lecture to Delete</option>';
  if (!chapterId) return;
  try {
    const res = await fetch(`/api/lectures?chapterId=${chapterId}`);
    const lectures = await res.json();
    lectures.forEach(lec => {
      const opt = document.createElement('option');
      opt.value = lec._id;
      opt.textContent = lec.title;
      select.appendChild(opt);
    });
  } catch (e) {}
}

async function executeManageAction() {
  if (!token) {
    alert("Please login as admin first");
    hideManageModal();
    return;
  }
  const headers = {
    'Content-Type': 'application/json',
    'Authorization': `Bearer ${token}`
  };

  try {
    if (manageMode === 1) {
      const title = document.getElementById('chapter-title').value.trim();
      if (!title) return alert("Chapter title is required");
      await fetch('/api/chapters', { method: 'POST', headers, body: JSON.stringify({ subjectId, title, order: Date.now() }) });
    }
    else if (manageMode === 2) {
      const title = document.getElementById('lecture-title').value.trim();
      const chapterId = document.getElementById('lecture-chapter-select').value;
      if (!title || !chapterId) return alert("Title and Chapter are required");
      const newLecture = {
        subjectId, chapterId, title,
        date: document.getElementById('lecture-date').value || new Date().toLocaleDateString('en-GB'),
        duration: document.getElementById('lecture-duration').value || "45m",
        youtubeId: document.getElementById('lecture-youtube').value.trim(),
        imageUrl: document.getElementById('lecture-image').value.trim()
      };
      await fetch('/api/lectures', { method: 'POST', headers, body: JSON.stringify(newLecture) });
    }
    else if (manageMode === 3) {
      const chapterId = document.getElementById('delete-chapter-select').value;
      if (!chapterId || !confirm("Delete this chapter?")) return;
      await fetch(`/api/chapters/${chapterId}`, { method: 'DELETE', headers });
    }
    else if (manageMode === 4) {
      const lectureId = document.getElementById('delete-lecture-select').value;
      if (!lectureId || !confirm("Delete this lecture?")) return;
      await fetch(`/api/lectures/${lectureId}`, { method: 'DELETE', headers });
    }
    hideManageModal();
    loadData();
  } catch (err) {
    console.error(err);
    alert("Action failed");
  }
}

// Initialize
window.onload = loadData;
</script>
</body>
</html>
