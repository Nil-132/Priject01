<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>All Classes - My PW</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body { 
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif; 
    }
    
    .chapter-item:hover { background-color: #f8fafc; }
    .active-chapter { 
      background-color: #f0f9ff; 
      border-left: 4px solid #3b82f6; 
    }
    
    .lecture-card { 
      transition: all 0.3s ease; 
    }
    .lecture-card:hover { 
      transform: translateY(-2px); 
      box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1); 
    }

    /* Mobile Improvements */
    @media (max-width: 768px) {
      .modal-content {
        margin: 1rem;
        max-height: 90vh;
        overflow-y: auto;
      }
      .sidebar {
        transform: translateX(-100%);
        transition: transform 0.3s ease;
      }
      .sidebar.open {
        transform: translateX(0);
      }
    }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">

<!-- Top Navbar (Mobile) -->
<div class="md:hidden bg-white border-b sticky top-0 z-50">
  <div class="px-4 py-4 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <button onclick="toggleSidebar()" class="text-2xl text-gray-700">
        <i class="fa-solid fa-bars"></i>
      </button>
      <h1 class="text-xl font-semibold" id="mobile-subject-title">All Classes</h1>
    </div>
    <button onclick="showManageModal()" 
            class="flex items-center gap-2 bg-blue-600 text-white px-5 py-2 rounded-2xl text-sm font-medium">
      <i class="fa-solid fa-plus"></i> Manage
    </button>
  </div>
</div>

<div class="flex h-screen overflow-hidden">

  <!-- Sidebar -->
  <div id="sidebar" class="sidebar w-72 bg-white border-r border-gray-200 overflow-y-auto md:relative absolute inset-y-0 left-0 z-50 md:translate-x-0">
    <div class="p-6 md:pt-8">
      <a href="/subjects.html" class="flex items-center gap-2 text-lg font-semibold text-gray-800 mb-6">
        ← Subjects
      </a>
      
      <div class="text-xs font-medium text-gray-500 mb-3 px-3">CHAPTERS</div>
      <div id="sidebar-content" class="px-3 space-y-0.5"></div>
    </div>
  </div>

  <!-- Overlay for mobile -->
  <div id="overlay" onclick="toggleSidebar()" class="md:hidden hidden fixed inset-0 bg-black/50 z-40"></div>

  <!-- Main Content -->
  <div class="flex-1 flex flex-col overflow-hidden">

    <!-- Desktop Header -->
    <div class="hidden md:flex bg-white border-b px-8 py-5 justify-between items-center">
      <h1 class="text-2xl font-semibold" id="subject-title">All Classes</h1>
      <button onclick="showManageModal()" 
              class="flex items-center gap-2 bg-blue-600 text-white px-6 py-3 rounded-2xl font-medium">
        <i class="fa-solid fa-plus"></i> Manage
      </button>
    </div>

    <!-- Search + Filters -->
    <div class="bg-white border-b px-4 md:px-8 py-4 flex flex-col md:flex-row gap-3 md:items-center">
      <div class="relative flex-1">
        <input type="text" id="search-input" placeholder="Search lectures..." 
               onkeyup="applyFilters()" 
               class="w-full border border-gray-300 rounded-2xl px-5 py-3.5 pl-12 focus:outline-none focus:border-blue-500 text-base">
        <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
      </div>
      
      <select id="filter-select" onchange="applyFilters()" 
              class="border border-gray-300 rounded-2xl px-5 py-3.5 focus:outline-none w-full md:w-auto">
        <option value="all">All Lectures</option>
        <option value="completed">Completed</option>
        <option value="pending">Not Completed</option>
      </select>
    </div>

    <div class="flex-1 overflow-y-auto p-4 md:p-8" id="main-content"></div>
  </div>
</div>

<!-- Manage Modal -->
<div id="manage-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-[100] p-4">
  <div class="modal-content bg-white rounded-3xl p-6 md:p-8 w-full max-w-lg">
    <h2 class="text-2xl font-semibold mb-6">Manage Content</h2>
    
    <div class="grid grid-cols-2 gap-3 mb-8">
      <button onclick="setManageMode(1)" id="btn1" class="manage-btn py-4 border-2 border-blue-600 text-blue-600 rounded-2xl font-medium">Add Chapter</button>
      <button onclick="setManageMode(2)" id="btn2" class="manage-btn py-4 border border-gray-300 rounded-2xl font-medium">Add Lecture</button>
      <button onclick="setManageMode(3)" id="btn3" class="manage-btn py-4 border border-gray-300 rounded-2xl font-medium">Delete Chapter</button>
      <button onclick="setManageMode(4)" id="btn4" class="manage-btn py-4 border border-gray-300 rounded-2xl font-medium">Delete Lecture</button>
    </div>

    <!-- Forms remain same as your original -->
    <div id="form1"><input id="chapter-title" type="text" placeholder="New Chapter Title" class="w-full border border-gray-300 rounded-2xl px-5 py-4"></div>

    <div id="form2" class="hidden space-y-4">
      <select id="lecture-chapter-select" class="w-full border border-gray-300 rounded-2xl px-5 py-4"></select>
      <input id="lecture-title" type="text" placeholder="Lecture Title" class="w-full border border-gray-300 rounded-2xl px-5 py-4">
      <div class="grid grid-cols-2 gap-4">
        <input id="lecture-date" type="date" class="w-full border border-gray-300 rounded-2xl px-5 py-4">
        <input id="lecture-duration" type="text" placeholder="Duration (e.g. 52m)" value="45m" class="w-full border border-gray-300 rounded-2xl px-5 py-4">
      </div>
      <input id="lecture-youtube" type="text" placeholder="YouTube Video ID" class="w-full border border-gray-300 rounded-2xl px-5 py-4">
      <input id="lecture-image" type="text" placeholder="Instructor Image URL (optional)" class="w-full border border-gray-300 rounded-2xl px-5 py-4">
    </div>

    <div id="form3" class="hidden">
      <select id="delete-chapter-select" class="w-full border border-gray-300 rounded-2xl px-5 py-4"></select>
    </div>

    <div id="form4" class="hidden">
      <select id="delete-lecture-chapter" onchange="updateDeleteLectureOptions()" class="w-full border border-gray-300 rounded-2xl px-5 py-4 mb-4"></select>
      <select id="delete-lecture-select" class="w-full border border-gray-300 rounded-2xl px-5 py-4"></select>
    </div>

    <div class="flex gap-4 mt-10">
      <button onclick="hideManageModal()" class="flex-1 py-4 border border-gray-300 rounded-2xl font-medium">Cancel</button>
      <button onclick="executeManageAction()" class="flex-1 py-4 bg-blue-600 text-white rounded-2xl font-semibold">Confirm</button>
    </div>
  </div>
</div>

<!-- Admin Login Modal (Same as before but improved) -->
<div id="loginModal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-[110] p-4">
  <div class="bg-white rounded-3xl p-8 w-full max-w-sm">
    <h3 class="text-xl font-semibold mb-4">Admin Login</h3>
    <p class="text-gray-600 mb-6">Default Password: <strong>admin123</strong></p>
    <input type="password" id="adminPass" placeholder="Enter password" class="w-full border border-gray-300 rounded-2xl px-5 py-4 mb-6">
    <div class="flex gap-3">
      <button onclick="hideLoginModal()" class="flex-1 py-4 border border-gray-300 rounded-2xl font-medium">Cancel</button>
      <button onclick="adminLogin()" class="flex-1 py-4 bg-blue-600 text-white rounded-2xl font-semibold">Login</button>
    </div>
  </div>
</div>

<script>
// ============== CONFIGURATION ==============
const urlParams = new URLSearchParams(window.location.search);
const subjectId = "quant";
const subjectName = urlParams.get('subjectName') || 'Quant';

document.getElementById('subject-title').textContent = subjectName;
document.getElementById('mobile-subject-title').textContent = subjectName;

let currentChapterId = null;
let manageMode = 1;
let token = null;
let isAdmin = false;
let allLectures = [];

// ============== Mobile Sidebar ==============
function toggleSidebar() {
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('overlay');
  sidebar.classList.toggle('open');
  overlay.classList.toggle('hidden');
}

// Close sidebar when clicking a chapter on mobile
function selectChapter(chapterId) {
  currentChapterId = chapterId;
  document.getElementById('search-input').value = '';
  document.getElementById('filter-select').value = 'all';
  if (window.innerWidth < 768) toggleSidebar(); // Close sidebar on mobile
  loadData();
}

// ============== REST OF YOUR SCRIPT (Slightly optimized) ==============
async function loadData() {
  try {
    const chaptersRes = await fetch(`/api/chapters?subjectId=${subjectId}`);
    const chapters = await chaptersRes.json();

    let lectures = [];
    if (currentChapterId) {
      const lecturesRes = await fetch(`/api/lectures?chapterId=${currentChapterId}`);
      lectures = await lecturesRes.json();
    } else if (chapters.length > 0) {
      currentChapterId = chapters[0]._id;
      const lecturesRes = await fetch(`/api/lectures?chapterId=${currentChapterId}`);
      lectures = await lecturesRes.json();
    }

    allLectures = lectures;
    renderSidebar(chapters);
    renderLectures(lectures);
  } catch (err) {
    console.error(err);
    document.getElementById('main-content').innerHTML = `<p class="text-center text-red-500 py-20">Failed to load data</p>`;
  }
}

function renderSidebar(chapters) {
  const container = document.getElementById('sidebar-content');
  let html = '';

  chapters.forEach(ch => {
    const active = ch._id === currentChapterId ? 'active-chapter' : 'chapter-item';
    html += `
      <div class="${active} px-4 py-3.5 text-sm cursor-pointer rounded-xl" 
           onclick="selectChapter('${ch._id}')">
        ${ch.title}
      </div>`;
  });

  container.innerHTML = html;
}

function renderLectures(lectures) {
  const container = document.getElementById('main-content');
  if (lectures.length === 0) {
    container.innerHTML = `<p class="text-center text-gray-500 py-20">No lectures found.</p>`;
    return;
  }

  let html = '';
  lectures.forEach(lec => {
    const imageUrl = lec.imageUrl || "https://via.placeholder.com/80x80/1f2937/ffffff?text=Instructor";
    const isCompleted = lec.completed === true;

    html += `
      <div class="lecture-card bg-white rounded-3xl p-5 flex gap-4 border border-gray-100 mb-6">
        <img src="${imageUrl}" class="w-16 h-16 rounded-2xl object-cover flex-shrink-0">
        <div class="flex-1 min-w-0">
          <div class="flex justify-between items-start">
            <div class="flex-1">
              <span class="text-xs text-gray-500">${lec.date || 'N/A'} • ${lec.duration || '45m'}</span>
              <h3 class="font-semibold text-base mt-1 line-clamp-2 pr-2">${lec.title}</h3>
            </div>
            <button onclick="markLectureComplete('${lec._id}')" 
                    class="w-9 h-9 flex items-center justify-center rounded-full border-2 flex-shrink-0
                           ${isCompleted ? 'bg-green-500 border-green-500 text-white' : 'border-gray-300 hover:border-green-500 hover:bg-green-50'}">
              ${isCompleted ? '<i class="fa-solid fa-check"></i>' : '<i class="fa-solid fa-check text-gray-400"></i>'}
            </button>
          </div>

          <div class="flex gap-3 mt-6">
            <button onclick="playVideo('${lec.youtubeId || ''}')" 
                    class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white py-3 rounded-2xl text-sm font-medium flex items-center justify-center gap-2">
              <i class="fa-solid fa-play"></i> Watch Video
            </button>
            <button onclick="alert('Notes feature coming soon')" 
                    class="flex-1 border border-gray-300 hover:bg-gray-50 py-3 rounded-2xl text-sm font-medium">
              Notes
            </button>
          </div>
        </div>
      </div>`;
  });

  container.innerHTML = html;
}

// Keep all your other functions (applyFilters, playVideo, markLectureComplete, manage modal functions, etc.)
// ... [Your original functions from applyFilters to executeManageAction remain unchanged]

function applyFilters() {
  const searchTerm = document.getElementById('search-input').value.toLowerCase().trim();
  const filterType = document.getElementById('filter-select').value;

  let filtered = allLectures.filter(lec => {
    const matchesSearch = !searchTerm || lec.title.toLowerCase().includes(searchTerm);
    let matchesFilter = true;
    if (filterType === 'completed') matchesFilter = lec.completed === true;
    if (filterType === 'pending') matchesFilter = lec.completed !== true;
    return matchesSearch && matchesFilter;
  });

  renderLectures(filtered);
}

function playVideo(videoId) {
  if (!videoId) return alert("No YouTube video ID added yet.");
  window.open(`https://www.youtube.com/embed/${videoId}?autoplay=1&rel=0`, '_blank');
}

// ... (Rest of your original script: adminLogin, showManageModal, setManageMode, etc. remain the same)

window.onload = loadData;
</script>
</body>
</html>
