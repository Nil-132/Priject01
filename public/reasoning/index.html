<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>All Classes - My PW</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; }
    .lecture-card { transition: all 0.3s ease; }
    .lecture-card:hover { transform: translateY(-3px); box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1); }

    /* Sidebar Animation for Mobile */
    .sidebar {
      transition: transform 0.4s cubic-bezier(0.32, 0.72, 0, 1);
    }
    @media (max-width: 768px) {
      .sidebar {
        position: fixed;
        left: -280px;
        top: 0;
        bottom: 0;
        z-index: 100;
        width: 280px;
        box-shadow: 4px 0 15px rgba(0,0,0,0.15);
      }
      .sidebar.open {
        transform: translateX(280px);
      }
    }

    /* Nice Chapter Highlighting like screenshot */
    .active-chapter {
      background-color: #e0f2fe;
      border-left: 4px solid #3b82f6;
      border-radius: 12px;
      font-weight: 600;
    }
  </style>
</head>
<body class="bg-gray-50">

<!-- Overlay -->
<div id="overlay" onclick="toggleSidebar()" class="hidden fixed inset-0 bg-black/50 z-50 md:hidden"></div>

<div class="flex h-screen overflow-hidden">

  <!-- Sidebar -->
  <div class="sidebar w-72 bg-white border-r border-gray-200 overflow-y-auto" id="sidebar">
    <div class="p-6">
      <!-- Back Button - Visible on both mobile and desktop -->
      <a href="/subjects.html" class="flex items-center gap-2 text-lg font-semibold text-gray-700 hover:text-blue-600 mb-8">
        ← Subjects
      </a>

      <div class="px-6 py-4 text-xs font-medium text-gray-500">CHAPTERS</div>
      <div class="px-3 space-y-1" id="chapters-list"></div>
    </div>
  </div>

  <!-- Main Content -->
  <div class="flex-1 flex flex-col overflow-hidden">
    <div class="bg-white border-b px-4 py-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <!-- Hamburger Menu -->
        <button onclick="toggleSidebar()" class="md:hidden text-3xl text-gray-700">
          <i class="fa-solid fa-bars"></i>
        </button>
        <h1 class="text-2xl font-semibold" id="subject-title">All Classes</h1>
      </div>
      
      <button onclick="showManageModal()" 
              class="flex items-center gap-2 bg-blue-600 text-white px-6 py-3 rounded-2xl font-medium">
        <i class="fa-solid fa-plus"></i> Manage
      </button>
    </div>

    <!-- Search + Filters -->
    <div class="bg-white border-b px-4 py-4 flex gap-4 items-center">
      <div class="relative flex-1">
        <input type="text" id="search-input" placeholder="Search lectures by title..." 
               onkeyup="applyFilters()" 
               class="w-full border border-gray-300 rounded-2xl px-5 py-3 pl-12 focus:outline-none focus:border-blue-500">
        <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
      </div>
      <select id="filter-select" onchange="applyFilters()" 
              class="border border-gray-300 rounded-2xl px-5 py-3 focus:outline-none">
        <option value="all">All Lectures</option>
        <option value="completed">Completed</option>
        <option value="pending">Not Completed</option>
      </select>
    </div>

    <div class="flex-1 overflow-y-auto p-4 md:p-8" id="main-content"></div>
  </div>
</div>

<!-- Manage Modal and Login Modal (same as before) -->
<!-- ... [Your full Manage Modal and Login Modal code remains unchanged] ... -->

<script>
// ============== CONFIGURATION ==============
const urlParams = new URLSearchParams(window.location.search);
const subjectId = "reasoning";   // ← CHANGE THIS
const subjectName = urlParams.get('subjectName') || 'Reasoning Ability';

document.getElementById('subject-title').textContent = subjectName;

let currentChapterId = null;
let manageMode = 1;
let token = null;
let isAdmin = false;
let allLectures = [];

// Toggle Sidebar
function toggleSidebar() {
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('overlay');
  sidebar.classList.toggle('open');
  overlay.classList.toggle('hidden');
}

// ============== LOAD DATA ==============
async function loadData() {
  try {
    const chaptersRes = await fetch(`/api/chapters?subjectId=${subjectId}`);
    const chapters = await chaptersRes.json();

    let lectures = [];
    if (currentChapterId) {
      const lecturesRes = await fetch(`/api/lectures?chapterId=${currentChapterId}`);
      lectures = await lecturesRes.json();
    } else if (chapters.length > 0) {
      currentChapterId = chapters[0]._id;
      const lecturesRes = await fetch(`/api/lectures?chapterId=${currentChapterId}`);
      lectures = await lecturesRes.json();
    }

    allLectures = lectures;
    renderSidebar(chapters);
    renderLectures(lectures);
  } catch (err) {
    console.error(err);
    document.getElementById('main-content').innerHTML = `<p class="text-center text-red-500 py-20">Failed to load data</p>`;
  }
}

function renderSidebar(chapters) {
  const container = document.getElementById('chapters-list');
  container.innerHTML = '';

  chapters.forEach(ch => {
    const active = ch._id === currentChapterId ? 'active-chapter' : 'chapter-item';
    const div = document.createElement('div');
    div.className = `${active} px-4 py-3 text-sm cursor-pointer hover:bg-gray-100 rounded-xl`;
    div.textContent = ch.title;
    div.onclick = () => {
      selectChapter(ch._id);
      if (window.innerWidth < 768) toggleSidebar(); // auto close on mobile
    };
    container.appendChild(div);
  });
}

function renderLectures(lectures) {
  const container = document.getElementById('main-content');
  let html = '';

  if (lectures.length === 0) {
    container.innerHTML = `<p class="text-center text-gray-500 py-20">No lectures found.</p>`;
    return;
  }

  lectures.forEach(lec => {
    const imageUrl = lec.imageUrl || "https://via.placeholder.com/80x80/1f2937/ffffff?text=Instructor";
    const isCompleted = lec.completed === true;

    html += `
      <div class="lecture-card bg-white rounded-3xl p-5 flex gap-4 border border-gray-100 mb-5">
        <img src="${imageUrl}" class="w-16 h-16 rounded-2xl object-cover flex-shrink-0">
        <div class="flex-1">
          <div class="flex justify-between items-start">
            <div>
              <span class="text-xs text-gray-500">${lec.date || 'N/A'} • ${lec.duration || '45m'}</span>
              <h3 class="font-semibold text-base mt-1 line-clamp-2">${lec.title}</h3>
            </div>
            <button onclick="markLectureComplete('${lec._id}')" 
                    class="w-9 h-9 flex items-center justify-center rounded-full border-2 flex-shrink-0
                           ${isCompleted ? 'bg-green-500 border-green-500 text-white' : 'border-gray-300 hover:border-green-500 hover:bg-green-50'}">
              ${isCompleted ? '<i class="fa-solid fa-check"></i>' : '<i class="fa-solid fa-check text-gray-400"></i>'}
            </button>
          </div>

          <div class="flex gap-3 mt-5">
            <button onclick="playVideo('${lec.youtubeId || ''}')" 
                    class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white py-2.5 rounded-2xl text-sm font-medium flex items-center justify-center gap-2">
              <i class="fa-solid fa-play"></i> Watch
            </button>
            <button onclick="alert('Notes feature coming soon')" 
                    class="flex-1 border border-gray-300 hover:bg-gray-50 py-2.5 rounded-2xl text-sm font-medium">
              Notes & more
            </button>
          </div>
        </div>
      </div>`;
  });

  container.innerHTML = html;
}

// Rest of your functions (applyFilters, playVideo, markLectureComplete, selectChapter, manage modal functions) remain the same as your previous code

// Initialize
window.onload = loadData;
</script>
</body>
</html>
